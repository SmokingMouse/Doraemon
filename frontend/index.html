<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Web Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 350px;
        }

        #login-box h1 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        #chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        #chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header h1 {
            font-size: 20px;
            color: #333;
        }

        #logout-btn {
            width: auto;
            padding: 8px 16px;
            background: #f44336;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        #input-container {
            background: white;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            resize: none;
        }

        #send-btn {
            width: 100px;
        }

        .status {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin: 10px 0;
        }

        .error {
            color: #f44336;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-container">
        <div id="login-box">
            <h1>🤖 Doraemon</h1>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" value="admin">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" value="admin123">
            </div>
            <button onclick="login()">Login</button>
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-container">
        <div id="chat-header">
            <h1>💬 Chat with Doraemon</h1>
            <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div id="messages"></div>
        <div id="input-container">
            <textarea id="message-input" rows="1" placeholder="Type your message..."></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8765';
        let token = null;
        let ws = null;

        // Login
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });

                if (!response.ok) throw new Error('Login failed');

                const data = await response.json();
                token = data.access_token;

                // Switch to chat
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';

                // Connect WebSocket
                connectWebSocket();
            } catch (error) {
                document.getElementById('login-error').textContent = error.message;
            }
        }

        // Logout
        function logout() {
            if (ws) ws.close();
            token = null;
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
        }

        // Connect WebSocket
        function connectWebSocket() {
            ws = new WebSocket(`ws://localhost:8765/ws`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                // Authenticate
                ws.send(JSON.stringify({type: 'auth', token: token}));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addStatus('Connection error');
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
                addStatus('Disconnected');
            };
        }

        // Handle WebSocket messages
        let currentMessage = null;

        function handleWebSocketMessage(data) {
            if (data.type === 'auth_success') {
                console.log('Authenticated:', data.user_id);
                addStatus('Connected');
            } else if (data.type === 'status') {
                addStatus(data.status);
            } else if (data.type === 'chunk') {
                if (!currentMessage) {
                    currentMessage = addMessage('assistant', '');
                }
                currentMessage.textContent += data.content;
            } else if (data.type === 'complete') {
                currentMessage = null;
                removeStatus();
            } else if (data.type === 'error') {
                addStatus('Error: ' + data.message);
                currentMessage = null;
            }
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();

            if (!content || !ws) return;

            // Add user message
            addMessage('user', content);

            // Send to server
            ws.send(JSON.stringify({type: 'message', content: content}));

            // Clear input
            input.value = '';
        }

        // Add message to chat
        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);

            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return contentDiv;
        }

        // Add status message
        function addStatus(text) {
            removeStatus();
            const messagesDiv = document.getElementById('messages');
            const statusDiv = document.createElement('div');
            statusDiv.className = 'status';
            statusDiv.id = 'current-status';
            statusDiv.textContent = text;
            messagesDiv.appendChild(statusDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeStatus() {
            const status = document.getElementById('current-status');
            if (status) status.remove();
        }

        // Enter to send
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('message-input');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
